<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">
    <title>postly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="nav-cont px-5">
        <nav class="navbar navbar-expand-lg px-3">

            <div class="container-fluid">
                <a class="navbar-brand ms-2" href="#">Postly</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo02">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
                    <div class="ms-auto d-flex align-items-center">
                        <div id="userIcon" class="rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 40px; height: 40px; font-weight: bold;"></div>
                        <div class="group">
                            <svg viewBox="0 0 24 24" aria-hidden="true" class="search-icon">
                                <g>
                                    <path
                                        d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z">
                                    </path>
                                </g>
                            </svg>

                            <input id="query" class="input"  type="search" placeholder="Search..." name="searchbar" />
                        </div>

                        <button id="theme-toggle"><img src="sleep-mode.png" onclick="toggle(this)"></button>

                        <button class="bg-transparent " onclick="logOut()"><img src="logout.png"
                                class="logout"></button>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-lg-5 col-md-12">
                <div class="card p-3 form">
                    <div class="mb-3">
                        <label for="title" class="form-label ms-2">Title</label>
                        <input type="text" class="form-control" id="title">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label ms-2">Description</label>
                        <textarea class="form-control" id="description" rows="3"></textarea>
                    </div>

                    <div class="img-div d-flex flex-wrap gap-2 ps-2">
                        <img src="assets/img1.jpg" onclick="applybg(this)" class="bgimg">
                        <img src="https://i.pinimg.com/1200x/f1/c3/06/f1c3063ba6a8a82cd4a65fafb2daea4b.jpg"
                            onclick="applybg(this)" class="bgimg">
                        <img src="assets/image.gif" onclick="applybg(this)" class="bgimg">
                        <img src="https://i.pinimg.com/736x/27/4c/e6/274ce61984a1b0ecafe56345d6e7dc23.jpg"
                            onclick="applybg(this)" class="bgimg">
                                <label btn="btn btn-light" for="customImage" class="form-label ms-2">+</label>
                               <input type="file" class="form-control" id="customImage" accept="image/*" onchange="applybg(this)" style="display: none;">
                    </div>

                    <label class="form-label ms-2 mt-4">Customization</label>
                    <div class="dropdown-wrapper d-flex flex-row gap-2">
                        <select class="form-select custom-dropdown" id="fontPicker" onchange="changeFont(this)">
                            <option selected disabled>Font Family</option>
                            <option value="Segoe UI">Default</option>
                            <option value="PostyFont" style="font-family: 'PostyFont';">PostyFont</option>
                            <option value="Impact" style="font-family: 'Impact';">Impact</option>
                            <option value="Cursive" style="font-family: 'Cursive';">Sweet Apricot</option>
                        </select>

                        <select class="form-select custom-dropdown" id="sizePicker" onchange="changeSize(this)">
                            <option selected disabled>Size</option>
                            <option value="14px">Small</option>
                            <option value="18px">Medium</option>
                            <option value="24px">Large</option>
                            <option value="32px">X-Large</option>
                        </select>
                    </div>
                    <label class="form-label ms-2 mt-3">Text Color</label>
                    <div class="color-div d-flex flex-wrap gap-2 ps-2">
                        <div class="colorbox"
                            style="background-color: #ffffff; width: 45px; height: 45px; border-radius: 10%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #ae618f; width: 45px; height: 45px; border-radius: 10%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #000000; width: 45px; height: 45px; border-radius: 10%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #51a5b0; width: 45px; height: 45px; border-radius: 10%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #dfd980; width: 45px; height: 45px; border-radius: 10%;"
                            onclick="applycolor(this)"></div>
                        <div class="colorbox"
                            style="background-color: #96ceb4; width: 45px; height: 45px; border-radius: 10%;"
                            onclick="applycolor(this)"></div>
                        

                    </div>

                    <hr class="mt-3">


                    <div class=" mb-1 ms-auto d-flex justify-content-end">

                        <button class="btn preview pb-2" onclick="previewPost()">Preview</button>
                        <button class="btn ms-3 post pb-2" onclick="post()">Post</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-7 col-md-12">
                <div id="posts"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js"></script>
</body>

</html>
