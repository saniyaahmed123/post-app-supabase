<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>auth | postly</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="d-flex mt-5">
        <img src="assets/favicon.png" class="mt-4 me-3"> 
        <h2 class="mt-5 me-5">postly</h2>
    </div>

    <div class="form-div">
        <form>
            <div class="mb-2 name-row" id="nameRow" style="display: none;">
                <input type="text" class="form-control" id="fullname" placeholder="full name">
            </div>

            <div class="mb-2">
                <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
            <div class="mb-2">
                <input type="password" class="form-control" id="password" placeholder="password">
            </div>

            <div class="mb-2 flex btn-row">
                <button type="button" id="submitBtn">Log In</button>
            </div>
        </form>
        
        <p class="text-center mt-3 small text-white">
            <span id="toggleText">Don't have an account?</span> 
            <span class="toggle-link" id="toggleBtn" style="color: #22d3ee; cursor: pointer;">Create Account</span>
        </p>
    </div>

    <script src="auth.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
